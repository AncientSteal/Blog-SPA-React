<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>blog-spa</title>
</head>
<body class="relative overflow-x-hidden selection:bg-brand-300 selection:text-brand-700">
  <div class="network-preloader-bg">
      <div style="display: flex; margin: 0 auto; animation: htmlPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">
          <div style="width: 64px; height: 64px;"><img src="/Logo.svg" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;"/></div>
      </div>
  </div>
  <style>
    @keyframes htmlPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    .network-preloader-bg {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #000000;
      display: flex; justify-content: center; align-items: center;
      z-index: 999;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
    }

    body.app-loaded .network-preloader-bg {
      opacity: 0;
      visibility: hidden;
    }
  </style>
  <div id="root"></div>
  <script type="module" src="src/main.tsx"></script>
</body>
</html>
